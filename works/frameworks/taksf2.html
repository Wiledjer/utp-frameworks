<!DOCTYPE html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">

    <form>
        <table class="table table-bordered align-middle">
            <tbody>

                <tr>
                    <th style="width: 200px;">Фамилия</th>
                    <td>
                        <input type="text" class="form-control is-valid" name="surname" value="Иванов" required>
                        <div class="valid-feedback">Поле заполнено верно.</div>
                    </td>
                </tr>

                <tr>
                    <th>Имя</th>
                    <td>
                        <input type="text" class="form-control is-invalid" name="name" required placeholder="Иван">
                        <div class="invalid-feedback">Введите имя.</div>
                    </td>
                </tr>

                <tr>
                    <th>Интересы</th>
                    <td>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" id="study" value="учеба">
                            <label class="form-check-label" for="study">Учеба</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" id="sport" value="спорт">
                            <label class="form-check-label" for="sport">Спорт</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" id="books" value="книги">
                            <label class="form-check-label" for="books">Книги</label>
                        </div>
                    </td>
                </tr>

                <tr>
                    <th>Телефон</th>
                    <td>
                        <input type="tel" class="form-control is-valid" name="phone" required
                               pattern="\+7\s?\(?\d{3}\)?\s?\d{3}[-\s]?\d{2}[-\s]?\d{2}"
                               value="+7 (999) 123-45-67"
                               placeholder="+7 (XXX) XXX-XX-XX">
                        <div class="valid-feedback">Номер корректен.</div>
                        <div class="form-text text-secondary">Формат: +7 (999) 123-45-67</div>
                    </td>
                </tr>

                <tr>
                    <th>Возраст</th>
                    <td>
                        <input type="number" class="form-control is-valid" name="age" required min="18" max="100" step="1" value="25">
                        <div class="valid-feedback">Возраст подходит.</div>
                    </td>
                </tr>

                <tr>
                    <th>Email</th>
                    <td>
                        <input type="email" class="form-control is-invalid" name="email" required placeholder="example@mail.ru" value="некорректный">
                        <div class="invalid-feedback">Введите корректный email.</div>
                    </td>
                </tr>

                <tr>
                    <th>Дата рождения</th>
                    <td>
                        <input type="date" class="form-control is-valid" name="birthdate" required value="2000-01-01">
                        <div class="valid-feedback">Дата выбрана.</div>
                    </td>
                </tr>

                <tr>
                    <th>Год поступления</th>
                    <td>
                        <input type="number" class="form-control is-invalid" name="admissionYear" required min="2000" max="2030" step="1" value="1995">
                        <div class="invalid-feedback">Год должен быть от 2000 до 2030.</div>
                    </td>
                </tr>

                <tr>
                    <th>Пол</th>
                    <td>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input is-valid" type="radio" name="gender" id="male" value="М" checked>
                            <label class="form-check-label" for="male">М</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="gender" id="female" value="Ж">
                            <label class="form-check-label" for="female">Ж</label>
                        </div>
                        <div class="valid-feedback d-block">Пол указан.</div>
                    </td>
                </tr>
            </tbody>
        </table>
<center>
        <div class="text-center mt-3">
            <button type="submit" class="btn btn-primary me-2">OK</button>
            <button type="reset" class="btn btn-secondary">Cancel</button>
        </div>
    </form>
</center>

</body>
</html>
