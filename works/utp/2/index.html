<!DOCTYPE html>
<head>
    <style>
        body {
            font-family: sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
        }
        h1 {
            text-align: center;
        }
        .methods-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .method-table {
            width: 250px;
            border: 2px solid #333;
            border-collapse: collapse;
            background-color: #f9f9f9;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .method-table th {
            background-color: blue;
            color: white;
            padding: 12px;
            font-size: 1.2em;
        }
        .method-table td {
            padding: 20px;
            text-align: center;
        }
        .method-table button {
            background-color: #008CBA;
            border: none;
            color: white;
            padding: 10px 24px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.3s;
        }
        .method-table button:hover {
            background-color: #005f6b;
        }
    </style>
</head>
<body>
    <h1>Способы расположения элементов</h1>
    <div class="methods-container">
        <table class="method-table">
            <tr><th>Таблицы</th></tr>
            <tr><td><button onclick="location.href='table.html'">Открыть файл</button></td></tr>
        </table>
        <table class="method-table">
            <tr><th>Float</th></tr>
            <tr><td><button onclick="location.href='float.html'">Открыть файл</button></td></tr>
        </table>
        <table class="method-table">
            <tr><th>Relative</th></tr>
            <tr><td><button onclick="location.href='relative.html'">Открыть файл</button></td></tr>
        </table>
        <table class="method-table">
            <tr><th>Absolute</th></tr>
            <tr><td><button onclick="location.href='absolute.html'">Открыть файл</button></td></tr>
        </table>
        <table class="method-table">
            <tr><th>Fixed</th></tr>
            <tr><td><button onclick="location.href='fixed.html'">Открыть файл</button></td></tr>
        </table>
        <table class="method-table">
            <tr><th>Flexbox</th></tr>
            <tr><td><button onclick="location.href='flexbox.html'">Открыть файл</button></td></tr>
        </table>
    </div>
</body>
</html>
