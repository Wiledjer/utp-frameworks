<!DOCTYPE html>
<head>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 0 20px; }
        section { border: 1px solid #ccc; margin: 20px; padding: 15px; }
        .relative-container {
            position: relative;
            height: 200px;
            background: #f0f0f0;
            margin: 30px 0;
            border: 1px dashed #888;
        }
        .static-box {
            width: 100px;
            height: 100px;
            background: #a0a0a0;
            text-align: center;
            line-height: 100px;
            border: 1px solid #555;
            float: left;
            margin-right: 30px;
        }
        .relative-box {
            position: relative;
            top: 25px;
            left: 25px;
            width: 100px;
            height: 100px;
            background: #c0c0c0;
            text-align: center;
            line-height: 100px;
            border: 1px solid #555;
            float: left;
        }
        .ghost {
            width: 100px;
            height: 100px;
            border: 1px dashed #ff6666;
            float: left;
            margin-left: -160px;
            background: transparent;
            text-align: center;
            line-height: 100px;
            color: black;
            font-size: 10px;
        }
        .back-btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background-color: #008CBA; color: white; text-decoration: none; border-radius: 4px; }
        .back-btn:hover { background-color: #005f6b; }
        hr { margin: 20px 0; }
    </style>
</head>
<body>
    <h1>Relative позиционирование</h1>
    <section>
        <div class="relative-container">
            <div class="static-box">static</div>

            <div class="relative-box">relative<br>top:25 left:25</div>

            <div class="ghost">исходное</div>
        </div>
        <p><strong>Объяснение:</strong> Серый блок (static) стоит на месте. Светло-серый (relative) сдвинут на 25px вниз и вправо <strong>относительно своего исходного положения</strong></p>
    </section>
    <a href="index.html" class="back-btn">Назад на главную</a>
</body>
</html>
