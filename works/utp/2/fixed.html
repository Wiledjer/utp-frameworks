<!DOCTYPE html>
<head>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 0 20px; }
        section { border: 1px solid #ccc; margin: 20px; padding: 15px; }
        .fixed-box {
            position: fixed;
            bottom: 15px;
            right: 15px;
            width: 80px;
            height: 80px;
            background: #ffdddd;
            border: 2px solid #333;
            text-align: center;
            line-height: 80px;
            font-weight: bold;
        }
        .back-btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background-color: #008CBA; color: white; text-decoration: none; border-radius: 4px; }
        .back-btn:hover { background-color: #005f6b; }
    </style>
</head>
<body>
    <h1>Fixed позиционирование</h1>
    <section>
        <h2>Фиксированный блок</h2>
        <p>Серый квадрат в правом нижнем углу окна зафиксирован при прокрутке.</p>
        <p>Прокрутите страницу, чтобы увидеть, что блок остаётся на месте.</p>
        <div style="height: 1000px; background: linear-gradient(white, lightgray);">
            (Зона для прокрутки)
        </div>
    </section>
    <div class="fixed-box">Fixed</div>
    <a href="index.html" class="back-btn">Назад на главную</a>
</body>
</html>
